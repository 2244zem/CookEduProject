[phases.setup]
nixPkgs = ["php82", "php82Packages.composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

# Do NOT config:cache here — build-time env is empty and breaks Railway runtime
[phases.build]
cmds = ["chmod +x scripts/railway-start.sh"]

[start]
cmd = "bash scripts/railway-start.sh"

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"
